<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expression RealNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #A855F7 0%, #7C3AED 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .emoji {
            font-size: 6rem;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .description {
            font-size: 1.2rem;
            text-align: center;
            max-width: 700px;
            margin-bottom: 50px;
            line-height: 1.8;
        }
        
        .beat-grid {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .beat-cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        
        .beat-cell:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }
        
        .beat-cell.active {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .community-counter {
            margin-top: 30px;
            font-size: 1.3rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎹</div>
        <h1>Expression RealNet</h1>
        <p class="subtitle">表現構築型リアルネット</p>
        <p class="description">
            ビートを創造し、コミュニティと共有するプラットフォーム。<br>
            クリックしてリズムを作り出そう。
        </p>
        
        <div class="beat-grid" id="beatGrid"></div>
        
        <div class="controls">
            <button onclick="playBeat()">▶ Play</button>
            <button onclick="clearBeat()">🔄 Clear</button>
            <button onclick="shareBeat()">📤 Share</button>
        </div>
        
        <div class="community-counter" id="counter">
            🌐 コミュニティメンバー: <span id="memberCount">1247</span>
        </div>
    </div>
    
    <script>
        const beatGrid = document.getElementById('beatGrid');
        const beats = [];
        let isPlaying = false;
        
        // Create beat grid
        for (let i = 0; i < 32; i++) {
            const cell = document.createElement('div');
            cell.className = 'beat-cell';
            cell.dataset.index = i;
            cell.addEventListener('click', () => {
                cell.classList.toggle('active');
            });
            beatGrid.appendChild(cell);
            beats.push(cell);
        }
        
        function playBeat() {
            if (isPlaying) return;
            isPlaying = true;
            
            let index = 0;
            const interval = setInterval(() => {
                beats.forEach(b => b.style.transform = 'scale(1)');
                
                if (beats[index].classList.contains('active')) {
                    beats[index].style.transform = 'scale(1.3)';
                    // Simulate sound with visual feedback
                    beats[index].style.boxShadow = '0 0 30px rgba(255, 255, 255, 1)';
                    setTimeout(() => {
                        beats[index].style.boxShadow = '';
                    }, 200);
                }
                
                index++;
                if (index >= beats.length) {
                    clearInterval(interval);
                    isPlaying = false;
                }
            }, 150);
        }
        
        function clearBeat() {
            beats.forEach(beat => {
                beat.classList.remove('active');
                beat.style.transform = 'scale(1)';
            });
        }
        
        function shareBeat() {
            const activeCount = beats.filter(b => b.classList.contains('active')).length;
            if (activeCount > 0) {
                alert(`🎉 ビートを共有しました！\n${activeCount}個のノートを含むビートがコミュニティに追加されました。`);
                const memberCount = document.getElementById('memberCount');
                memberCount.textContent = parseInt(memberCount.textContent) + 1;
            } else {
                alert('ビートを作成してから共有してください！');
            }
        }
        
        // Animate member count
        setInterval(() => {
            const memberCount = document.getElementById('memberCount');
            if (Math.random() > 0.7) {
                memberCount.textContent = parseInt(memberCount.textContent) + 1;
            }
        }, 5000);
    </script>
</body>
</html>
