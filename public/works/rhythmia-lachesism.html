<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACHESISM - 70 Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #FF0844 0%, #8B0000 100%);
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }
        
        .container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        h1 {
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(255, 8, 68, 0.8);
            margin-bottom: 10px;
            animation: flicker 2s infinite;
        }
        
        .subtitle {
            font-size: 2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .emoji {
            font-size: 8rem;
            margin-bottom: 30px;
            animation: shake 0.5s infinite;
        }
        
        .description {
            font-size: 1.5rem;
            text-align: center;
            max-width: 600px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .wave-counter {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        .survive-button {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .survive-button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }
        
        .chaos-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="chaos-particles" id="particles"></div>
    
    <div class="container">
        <div class="emoji">🌋</div>
        <h1>LACHESISM</h1>
        <div class="subtitle">70 Waves</div>
        <p class="description">
            災害を求める魂へ。70の試練を生き延びるカオスサバイバルゲーム。
        </p>
        <div class="wave-counter" id="waveCounter">Wave: 1 / 70</div>
        <button class="survive-button" onclick="nextWave()">SURVIVE</button>
    </div>
    
    <script>
        let currentWave = 1;
        const maxWaves = 70;
        
        function nextWave() {
            if (currentWave < maxWaves) {
                currentWave++;
                document.getElementById('waveCounter').textContent = `Wave: ${currentWave} / ${maxWaves}`;
                createChaos();
            } else {
                alert('🎉 70の試練を生き延びた！あなたは真のサバイバーだ！');
                currentWave = 1;
                document.getElementById('waveCounter').textContent = `Wave: ${currentWave} / ${maxWaves}`;
            }
        }
        
        function createChaos() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 20 + 10 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = Math.random() * 2 + 3 + 's';
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 5000);
            }
        }
        
        // Auto-generate initial chaos
        setInterval(createChaos, 2000);
    </script>
</body>
</html>
